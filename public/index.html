<!DOCTYPE html>
<html lang="en">
  <head>
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <meta charset="utf-8" />
    <link rel="icon" href="/NJ_Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="/NJ_Logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      html {
        background-color: #121212;
      }
    </style>
    <script>
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <title>Noah James | Portfolio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="loading-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #64ffda;">
        <div class="loader">Loading...</div>
      </div>
    </div>
  </body>
</html>
